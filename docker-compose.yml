
services:
  # The Database Layer
  db:
    image: postgres:15
    container_name: task_db_container

    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Application Layer
  app:
    build: .
    container_name: task_app_container
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:

      - POSTGRES_HOST=db
    # Ensures the app waits for the database to be 'healthy'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: